<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quà Tặng 8/3</title>
    <style>
        :root { --p: #ff69b4; --d: #d81b60; }
        body { font-family: 'Arial', sans-serif; background: #fff5f7; text-align: center; color: var(--d); margin: 0; padding: 20px; }
        .heart { position: fixed; top: -10px; font-size: 20px; color: var(--p); z-index: 1; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
        .card { background: white; max-width: 450px; margin: 20px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 10; overflow: hidden; }
        .card img { width: 100%; border-radius: 15px; margin: 15px 0; min-height: 150px; object-fit: cover; }
        .controls { background: white; max-width: 450px; margin: 20px auto; padding: 20px; border-radius: 15px; border: 2px dashed var(--p); text-align: left; }
        input, textarea { width: 92%; margin: 8px 0; padding: 10px; border: 1px solid #f8bbd0; border-radius: 8px; }
        button { background: var(--p); color: white; border: none; padding: 15px; border-radius: 30px; width: 100%; cursor: pointer; font-weight: bold; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <div id="overlay">
            <h2 style="margin-bottom:20px;">Bạn có 1 món quà! 🎁</h2>
            <button onclick="openGift()" style="width: auto; padding: 10px 40px;">Bấm để mở</button>
        </div>
        <h1 id="display-title">Happy Women's Day! 🌸</h1>
        <img id="display-img" src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?w=500">
        <p id="display-wish">Chúc bạn một ngày 8/3 thật hạnh phúc!</p>
        <div id="yt-container"></div>
    </div>

    <div class="controls" id="admin-panel">
        <h3 style="text-align:center;">Cấu hình Link Tặng 🎁</h3>
        <input type="text" id="i-t" placeholder="Tiêu đề...">
        <textarea id="i-w" rows="2" placeholder="Lời chúc..."></textarea>
        <input type="text" id="i-i" placeholder="Link ảnh (.jpg, .png)...">
        <input type="text" id="i-y" placeholder="Link YouTube bài hát...">
        <button onclick="makeLink()">TẠO & SAO CHÉP LINK</button>
        <textarea id="final-link" style="display:none; margin-top:10px; height:40px;"></textarea>
    </div>

    <script>
        // Hiệu ứng tim rơi
        setInterval(() => {
            const h = document.createElement('div'); h.classList.add('heart'); h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw'; h.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(h); setTimeout(() => h.remove(), 5000);
        }, 500);

        let vId = "";
        window.onload = function() {
            const p = new URLSearchParams(window.location.search);
            if (p.has('t') || p.has('w') || p.has('y')) {
                document.getElementById('admin-panel').classList.add('hidden');
                if(p.get('t')) document.getElementById('display-title').innerText = decodeURIComponent(p.get('t'));
                if(p.get('w')) document.getElementById('display-wish').innerText = decodeURIComponent(p.get('w'));
                if(p.get('i')) document.getElementById('display-img').src = decodeURIComponent(p.get('i'));
                if(p.get('y')) vId = p.get('y');
            } else {
                document.getElementById('overlay').classList.add('hidden');
            }
        };

        function openGift() {
            document.getElementById('overlay').classList.add('hidden');
            if(vId) {
                document.getElementById('yt-container').innerHTML = 
                `<iframe width="0" height="0" src="https://www.youtube.com/embed/${vId}?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
            }
        }

        function makeLink() {
            const t = encodeURIComponent(document.getElementById('i-t').value || "Happy 8/3");
            const w = encodeURIComponent(document.getElementById('i-w').value || "Hạnh phúc nhé!");
            const i = encodeURIComponent(document.getElementById('i-i').value || "");
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const m = document.getElementById('i-y').value.match(reg);
            const y = (m && m[2].length === 11) ? m[2] : "";

            const link = window.location.origin + window.location.pathname + `?t=${t}&w=${w}&i=${i}&y=${y}`;
            const box = document.getElementById('final-link');
            box.value = link; box.style.display = 'block'; box.select();
            document.execCommand("copy");
            alert("Đã copy link! Gửi link này cho người ấy nhé.");
        }
    </script>
</body>
</html>
